<!DOCTYPE html>
<html lang="en" translate="no">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow">
  <meta name="google" content="notranslate">

  <title>Gears | On 735</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist-font@latest/style.css">

  <style>
    :root {
      --bg: #000;
      --primary: #7e3de5;
      --secondary: #fff;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--secondary);
      font-family: 'Geist Sans', sans-serif;
    }

    .site-title {
      position: fixed;
      top: 28px;
      left: 32px;
      z-index: 10;
      margin: 0;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .site-title a {
      color: var(--secondary);
      text-decoration: none;
    }

    .desktop-nav {
      position: fixed;
      top: 32px;
      right: 32px;
      z-index: 10;
      display: flex;
      gap: 28px;
      font-size: 14px;
      font-weight: 700;
    }

    .desktop-nav a,
    .mobile-menu a {
      color: var(--secondary);
      text-decoration: none;
    }

    .desktop-nav a:hover,
    .mobile-menu a:hover {
      color: var(--primary);
    }

    .menu-button,
    .mobile-menu {
      display: none;
    }

    main {
      min-height: 100vh;
      padding: 120px 48px 72px;
      box-sizing: border-box;
    }

    .content {
      max-width: 760px;
      margin-left: auto;
      text-align: right;
    }

    .page-title {
      margin: 0 0 14px;
      font-size: 40px;
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1;
    }

    .page-description {
      margin: 0 0 48px;
      font-size: 14px;
      font-weight: 400;
      line-height: 1.4;
      letter-spacing: -0.01em;
      color: var(--secondary);
      opacity: 0.8;
    }

    .gear-card {
      margin-bottom: 72px;
    }

    .card-title {
      margin: 0 0 20px;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.01em;
      line-height: 1.1;
    }

    .gear-image {
      width: 100%;
      margin-bottom: 28px;
      display: block;
    }

    .distance-row {
      display: flex;
      justify-content: flex-end;
      align-items: baseline;
      gap: 6px;
      margin-bottom: 18px;
    }

    .distance-current {
      color: var(--primary);
      font-size: 38px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.04em;
    }

    .distance-target,
    .meta-text {
      color: var(--secondary);
      font-size: 14px;
      font-weight: 400;
      line-height: 1.45;
      letter-spacing: -0.01em;
      opacity: 0.8;
    }

    .progress {
      width: 50%;
      height: 3px;
      margin: 0 0 18px auto;
      background: rgba(255, 255, 255, 0.18);
      overflow: hidden;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      background: var(--primary);
      transition: width 2s ease;
    }

    .progress-line {
      margin: 0;
      line-height: 1.45;
    }

    .progress-number {
      color: var(--primary);
      font-size: 38px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.04em;
    }

    .tracked {
      margin: 2px 0 0;
    }

    .specs {
      margin-top: 24px;
    }

    .specs p {
      margin: 0;
    }

    .ratio-main {
      color: var(--primary);
      font-size: 38px;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.04em;
      margin: 0 0 12px;
    }

    .ratio-sub {
      color: var(--secondary);
      font-size: 14px;
      font-weight: 400;
      line-height: 1.45;
      letter-spacing: -0.01em;
      opacity: 0.8;
      margin: 0;
    }

    .footer {
      margin-top: 56px;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 24px;
      font-size: 12px;
      color: var(--secondary);
      opacity: 0.5;
    }

    @media (max-width: 767px) {
      .site-title {
        top: 24px;
        left: 24px;
        font-size: 26px;
      }

      .desktop-nav {
        display: none;
      }

      .menu-button {
        position: fixed;
        top: 28px;
        right: 24px;
        z-index: 20;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 5px;
        width: 35px;
        padding: 0;
        background: none;
        border: none;
      }

      .menu-line {
        height: 2px;
        background: var(--secondary);
        transition: 0.2s ease;
      }

      .menu-line:nth-child(1) { width: 35px; }
      .menu-line:nth-child(2) { width: 15px; }
      .menu-line:nth-child(3) { width: 25px; }

      .menu-button.is-open .menu-line:nth-child(1) {
        width: 28px;
        transform: translateY(7px) rotate(45deg);
      }

      .menu-button.is-open .menu-line:nth-child(2) {
        opacity: 0;
      }

      .menu-button.is-open .menu-line:nth-child(3) {
        width: 28px;
        transform: translateY(-7px) rotate(-45deg);
      }

      .mobile-menu {
        position: fixed;
        top: 56px;
        right: 0;
        z-index: 15;
        display: none;
        flex-direction: column;
        align-items: flex-end;
        gap: 16px;
        width: 42vw;
        padding: 20px 24px 20px 0;
        box-sizing: border-box;
        background: rgba(0, 0, 0, 0.8);
        text-align: right;
        font-size: 18px;
        font-weight: 700;
      }

      .mobile-menu.is-open {
        display: flex;
      }

      main {
        padding: 88px 24px 64px;
      }

      .content {
        max-width: none;
      }

      .page-title {
        font-size: 34px;
        margin-bottom: 48px;
      }

      .gear-card {
        margin-bottom: 64px;
      }

      .card-title {
        font-size: 17px;
      }

      .distance-current,
      .progress-number,
      .ratio-main {
        font-size: 34px;
      }

      .distance-target,
      .meta-text,
      .ratio-sub {
        font-size: 14px;
      }
    }
  </style>
</head>

<body>

  <h1 class="site-title">
    <a href="/">On 735</a>
  </h1>

  <nav class="desktop-nav">
    <a href="/monitor/">Monitor</a>
    <a href="/log/">Log</a>
    <a href="/gears/">Gears</a>
  </nav>

  <button class="menu-button" aria-label="Open menu">
    <span class="menu-line"></span>
    <span class="menu-line"></span>
    <span class="menu-line"></span>
  </button>

  <nav class="mobile-menu">
    <a href="/monitor/">Monitor</a>
    <a href="/log/">Log</a>
    <a href="/gears/">Gears</a>
  </nav>

  <main>
    <section class="content">
      <h1 class="page-title">Gears</h1>

      <p class="page-description">Tracking maintenance timing for each component</p>
      
      <div id="gear-list"></div>

      <section class="gear-card">
        <h2 class="card-title">Gear ratio</h2>
        <img class="gear-image" src="../Gear%20ratio.jpg" alt="Gear ratio">
        <p class="ratio-main">3.27</p>
        <p class="ratio-sub">49T / 15T</p>
        <p class="ratio-sub">Skid point: 15</p>
      </section>

      <footer class="footer">
        <span>UPDATED 7:35 AM</span>
        <span>©︎ 2026 Yuto Fukushima</span>
      </footer>
    </section>
  </main>

  <script>
    const menuButton = document.querySelector('.menu-button');
    const mobileMenu = document.querySelector('.mobile-menu');

    menuButton.addEventListener('click', () => {
      menuButton.classList.toggle('is-open');
      mobileMenu.classList.toggle('is-open');
    });

    const gears = [
      {
        title: 'Frame: LEADER 735TR',
        image: '../Frame.jpg',
        targetKm: 8000,
        purpose: 'overhaul',
        trackedFrom: '2026-06-20',
        specs: ['Frame Weight: 7.8 kg', 'Gross Weight: 8.8 kg']
      },
      {
        title: 'Chain: KMC Z410',
        image: '../Chain.jpg',
        targetKm: 4000,
        purpose: 'replacement',
        trackedFrom: '2026-06-20'
      },
      {
        title: 'Rear tire: GOOD YEAR EAGLE 700c x 25c',
        image: '../Rear%20tire.jpg',
        targetKm: 4000,
        purpose: 'replacement',
        trackedFrom: '2026-06-20'
      },
      {
        title: 'Front tire: GOOD YEAR EAGLE 700c x 25c',
        image: '../Front%20tire.jpg',
        targetKm: 6500,
        purpose: 'replacement',
        trackedFrom: '2026-06-20'
      },
      {
        title: 'BB: FSA BB-EVO8681',
        image: '../BB.jpg',
        targetKm: 15000,
        purpose: 'replacement',
        trackedFrom: '2026-06-20'
      },
      {
        title: 'Chain ring: VISION NS TRACK 49T',
        image: '../Chain%20ring.jpg',
        targetKm: 20000,
        purpose: 'replacement',
        trackedFrom: '2026-06-20'
      },
      {
        title: 'Cog: EURO-ASIA DELUXE 15T',
        image: '../Cog.jpg',
        targetKm: 15000,
        purpose: 'replacement',
        trackedFrom: '2026-06-20'
      }
    ];

    async function loadRideData() {
      try {
        const response = await fetch('../data/rides.json');
        const data = await response.json();
        const rides = data.rides || [];

        renderGears(rides);
      } catch (error) {
        console.error('Failed to load ride data:', error);
        renderGears([]);
      }
    }

    function renderGears(rides) {
      const list = document.getElementById('gear-list');

      list.innerHTML = gears.map((gear) => {
        const totalDistance = getDistanceFrom(rides, gear.trackedFrom);
        const progress = gear.targetKm > 0
          ? Math.min(Math.round((totalDistance / gear.targetKm) * 100), 100)
          : 0;

        const specsHtml = gear.specs
          ? `<div class="specs meta-text">${gear.specs.map(item => `<p>${item}</p>`).join('')}</div>`
          : '';

        return `
          <section class="gear-card">
            <h2 class="card-title">${gear.title}</h2>
            <img class="gear-image" src="${gear.image}" alt="${gear.title}">
            <div class="distance-row">
              <span class="distance-current">${formatNumber(totalDistance)}</span>
              <span class="distance-target">/ ${formatNumber(gear.targetKm)} km</span>
            </div>
            <div class="progress">
              <div class="progress-fill" data-progress="${progress}"></div>
            </div>
            <p class="progress-line">
              <span class="progress-number">${progress}</span>
              <span class="meta-text">% ridden toward ${gear.purpose}</span>
            </p>
            <p class="tracked meta-text">Tracked from ${formatTrackedDate(gear.trackedFrom)}</p>
            ${specsHtml}
          </section>
        `;
      }).join('');

      requestAnimationFrame(() => {
        document.querySelectorAll('.progress-fill').forEach(bar => {
          bar.style.width = `${bar.dataset.progress}%`;
        });
      });
    }

    function getDistanceFrom(rides, trackedFrom) {
      const startDate = parseDate(trackedFrom);

      const total = rides
        .filter(ride => parseDate(ride.date) >= startDate)
        .reduce((sum, ride) => sum + Number(ride.distanceKm || 0), 0);

      return Math.round(total);
    }

    function parseDate(dateString) {
      const normalized = dateString.replace(/\./g, '-');
      const [year, month, day] = normalized.split('-').map(Number);
      return new Date(year, month - 1, day);
    }

    function formatTrackedDate(dateString) {
      return dateString.replace(/-/g, '.');
    }

    function formatNumber(value) {
      return Math.round(Number(value || 0)).toLocaleString();
    }

    loadRideData();
  </script>

</body>

</html>
