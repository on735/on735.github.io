<!DOCTYPE html>
<html lang="en" translate="no">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Log | On 735</title>
  <meta name="robots" content="noindex, nofollow">
  <meta name="google" content="notranslate">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/geist-font@latest/style.css">

  <style>
    :root {
      --bg: #000000;
      --primary: #7e3de5;
      --secondary: #ffffff;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--secondary);
      font-family: 'Geist Sans', sans-serif;
    }

    .log-bg {
      position: fixed;
      top: 0;
      left: 0;
      
      width: 100vw;
      height: 100vh;
      
      background-image: url("../bk02_0d0d0d_g2.svg");
      background-repeat: no-repeat;
      background-position: top center;
      background-size: cover;
      
      pointer-events: none;
      z-index: 0;
    }

    .site-title,
    .desktop-nav,
    .menu-button,
    .mobile-menu,
    main,
    footer {
      position: relative;
      z-index: 1;
    }

    .site-title {
      position: fixed;
      top: 28px;
      left: 24px;
      z-index: 10;
      margin: 0;
    }
    
    .site-title img {
      display: block;
      height: 23px;
      width: auto;
    }

    .desktop-nav {
      position: fixed;
      top: 32px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      gap: 56px;
      font-size: 14px;
      font-weight: 700;
    }

    .desktop-nav a,
    .mobile-menu a {
      position: relative;
      color: var(--secondary);
      text-decoration: none;
      padding-bottom: 8px;
    }

    .desktop-nav a:hover,
    .mobile-menu a:hover {
      color: var(--primary);
    }

    .desktop-nav a.is-active::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 3px;
      background: var(--primary);
    }

    .menu-button,
    .mobile-menu {
      display: none;
    }

    main {
      min-height: 100vh;
      padding: 120px 48px 64px;
      box-sizing: border-box;
    }

    .content {
      max-width: 720px;
      margin-left: auto;
      text-align: right;
    }

    .page-title {
      margin: 0 0 56px;
      font-size: 40px;
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1;
    }

    .log-table {
      width: 100%;
    }

    .log-header,
    .log-row {
      display: grid;
      grid-template-columns: 1.1fr 1fr 1fr 1fr;
      column-gap: 24px;
      align-items: baseline;
    }

    .log-header {
      margin-bottom: 16px;
    }

    .column-title {
      text-align: right;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: -0.01em;
      white-space: nowrap;
    }

    .column-line {
      width: 100%;
      height: 1px;
      margin-top: 12px;
      background: var(--secondary);
      opacity: 0.35;
    }

    .log-row {
      padding: 10px 0;
      font-size: 14px;
      line-height: 1.2;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .log-row:last-child {
      border-bottom: none;
    }

    .log-row span {
      text-align: right;
      white-space: nowrap;
    }

    .value {
      color: var(--primary);
      font-weight: 700;
    }

    .footer {
      margin-top: 48px;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 24px;
      font-size: 12px;
      color: var(--secondary);
      opacity: 0.5;
    }

    .footer span {
      white-space: nowrap;
    }

    @media (max-width: 767px) {
      .site-title {
        top: 28px;
        left: 24px;
        font-size: 26px;
      }

      .desktop-nav {
        display: none;
      }

      .menu-button {
        position: fixed;
        top: 30px;
        right: 24px;
        z-index: 20;
        
        display: flex;
        align-items: center;
        justify-content: center;
        
        width: 34px;
        height: 21px;
        
        padding: 0;
        background: none;
        border: none;
      }
      
      .menu-icon {
        display: block;
        width: 34px;
        height: 21px;
        background-image: url("../menu.svg");
        background-repeat: no-repeat;
        background-position: center;
        background-size: contain;
        transition: opacity 0.2s ease;
      }
      
      .menu-x-line {
        position: absolute;
        top: 11px;
        right: 0;
        width: 28px;
        height: 2px;
        background: var(--secondary);
        opacity: 0;
        transition: transform 0.2s ease, opacity 0.2s ease;
      }
      
      .menu-button.is-open .menu-icon {
        opacity: 0;
      }
      
      .menu-button.is-open .menu-x-line {
        opacity: 1;
      }
      
      .menu-button.is-open .menu-x-line:nth-child(2) {
        transform: rotate(45deg);
      }
      
      .menu-button.is-open .menu-x-line:nth-child(3) {
        transform: rotate(-45deg);
      }

      .mobile-menu {
        position: fixed;
        top: 55px;
        right: 0;
        z-index: 15;
        display: none;
        flex-direction: column;
        align-items: flex-end;
        gap: 16px;
        width: 42vw;
        padding: 20px 24px 20px 0;
        box-sizing: border-box;
        background: rgba(0, 0, 0, 0.8);
        text-align: right;
        font-size: 18px;
        font-weight: 700;
      }

      .mobile-menu.is-open {
        display: flex;
      }

      main {
        padding: 76px 0 64px;
      }

      .content {
        margin: 0 24px;
      }

      .page-title {
        font-size: 34px;
        margin-bottom: 48px;
      }

      .log-header,
      .log-row {
        grid-template-columns: 1.15fr 0.95fr 0.95fr 0.95fr;
        column-gap: 10px;
      }

      .column-title {
        font-size: 10px;
      }

      .log-row {
        padding: 9px 0;
        font-size: 10px;
      }

      .footer {
        margin-top: 40px;
        font-size: 11px;
      }
    }
  </style>
</head>

<body>

  <div class="log-bg"></div>

  <h1 class="site-title">
    <a href="/">
      <img src="../logo.svg" alt="On 735">
    </a>
  </h1>

  <nav class="desktop-nav">
    <a href="/monitor/">Monitor</a>
    <a href="/log/" class="is-active">Log</a>
    <a href="/gears/">Gears</a>
  </nav>

  <button class="menu-button" aria-label="Open menu">
    <span class="menu-line"></span>
    <span class="menu-line"></span>
    <span class="menu-line"></span>
  </button>

  <nav class="mobile-menu">
    <a href="/monitor/">Monitor</a>
    <a href="/log/">Log</a>
    <a href="/gears/">Gears</a>
  </nav>

  <main>

    <section class="content">
      <h1 class="page-title">Log</h1>

      <div class="log-table">
        <div class="log-header">
          <div>
            <div class="column-title">Date</div>
            <div class="column-line"></div>
          </div>
          <div>
            <div class="column-title">Ride Distance</div>
            <div class="column-line"></div>
          </div>
          <div>
            <div class="column-title">Max Speed</div>
            <div class="column-line"></div>
          </div>
          <div>
            <div class="column-title">Avg Speed</div>
            <div class="column-line"></div>
          </div>
        </div>

        <div id="log-body"></div>
      </div>

      <footer class="footer">
        <span>UPDATED 7:35 AM</span>
        <span>©︎ 2026 Yuto Fukushima</span>
      </footer>
    </section>
  </main>

  <script>
    const menuButton = document.querySelector('.menu-button');
    const mobileMenu = document.querySelector('.mobile-menu');

    menuButton.addEventListener('click', () => {
      menuButton.classList.toggle('is-open');
      mobileMenu.classList.toggle('is-open');
    });

    async function loadLogData() {
      try {
        const response = await fetch('../data/rides.json');
        const data = await response.json();
        const rides = data.rides || [];
        const logBody = document.getElementById('log-body');

        const sortedRides = [...rides].sort((a, b) => {
          return new Date(b.date) - new Date(a.date);
        });

        logBody.innerHTML = sortedRides.map(ride => {
          const date = ride.date.replace(/-/g, '.');
          const distance = Number(ride.distanceKm || 0).toFixed(1);
          const maxSpeed = Number(ride.maxSpeedKmh || 0).toFixed(1);
          const avgSpeed = Number(ride.avgSpeedKmh || 0).toFixed(1);

          return `
            <div class="log-row">
              <span>${date}</span>
              <span class="value">${distance} km</span>
              <span class="value">${maxSpeed} km/h</span>
              <span class="value">${avgSpeed} km/h</span>
            </div>
          `;
        }).join('');

      } catch (error) {
        console.error('Failed to load log data:', error);
      }
    }

    loadLogData();
  </script>

</body>

</html>
